name: Refresh Context7 index

on:
  push:
    branches: [main]
    paths:
      - "README.md"
      - "SKILL.md"
      - "rekko_tools.py"
      - "examples/**"
      - "context7.json"

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Context7 re-index
        run: |
          curl -X POST "https://context7.com/api/v1/refresh" \
            -H "Authorization: Bearer ${{ secrets.CONTEXT7_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"libraryName": "/rekko-ai/rekko-skill"}'
        continue-on-error: true
